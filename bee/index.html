<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripture Spelling Bee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/games.css">
    <style>
        .input-row {
            background-color: var(--paper-card);
            background-image: var(--washi);
            background-blend-mode: multiply;
            padding: 18px 24px;
            margin-bottom: 14px;
            text-align: center;
            box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 14px -8px rgba(31, 26, 22, 0.25);
        }
        #typing {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: 0.06em;
            min-height: 36px;
            text-transform: uppercase;
        }
        #typing.shake { animation: shake 0.4s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
        .hex-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            max-width: 320px;
            margin: 0 auto 14px;
        }
        .hex {
            aspect-ratio: 1;
            background-color: var(--paper-card);
            background-image: var(--washi);
            background-blend-mode: multiply;
            border: 2px solid rgba(120, 102, 80, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 1.6rem;
            text-transform: uppercase;
            color: var(--ink);
            cursor: pointer;
            user-select: none;
            transition: transform 0.05s, background-color 0.15s;
            clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
        }
        .hex.center {
            background-color: var(--gold);
            color: #fff;
            background-image: none;
        }
        .hex:active { transform: scale(0.94); }
        .actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 14px;
        }
        .actions button { flex: 1; max-width: 120px; }
        .found {
            background-color: var(--paper-card);
            background-image: var(--washi);
            background-blend-mode: multiply;
            padding: 16px 20px;
            margin-top: 14px;
            box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 6px 14px -8px rgba(31, 26, 22, 0.25);
        }
        .found h4 {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--seal);
            margin-bottom: 10px;
        }
        .found .words {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .found .word {
            background-color: var(--paper-deep);
            padding: 4px 10px;
            border-radius: 999px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.96rem;
            color: var(--ink);
        }
        .found .word.pangram { background-color: var(--gold); color: #fff; font-weight: 700; }
    </style>
</head>
<body>
    <div class="bg has-image" aria-hidden="true"></div>
    <main class="page">
        <header class="title-card">
            <h1>Scripture Spelling Bee</h1>
            <p class="subtitle">Make 4-letter+ words. Each word must use the gold center letter.</p>
        </header>

        <div class="score-strip">
            <div class="stat"><div class="label">Words</div><div class="val" id="count">0</div></div>
            <div class="stat"><div class="label">Score</div><div class="val" id="score">0</div></div>
            <div class="stat"><div class="label">Pangrams</div><div class="val" id="pangrams">0</div></div>
        </div>

        <div class="input-row"><div id="typing">&nbsp;</div></div>

        <div class="hex-row" id="hexes"></div>

        <div class="actions">
            <button class="btn ghost" id="del">Delete</button>
            <button class="btn ghost" id="shuffle">Shuffle</button>
            <button class="btn" id="enter">Enter</button>
        </div>

        <div class="message" id="message"></div>

        <div class="found">
            <h4>Words found</h4>
            <div class="words" id="words"></div>
        </div>

        <footer><p><a href="/">← back to seminary resources</a></p></footer>
    </main>

    <script>
    (function() {
        // Curated scripture-flavored 4+ letter words. Each puzzle picks 7 letters that yield enough valid words.
        // For one-shot, we hand-pick a few puzzles where the letters work.
        const PUZZLES = [
            { letters: 'AEFITRH', center: 'F', /* yields FAITH, FAIR, FAIR, FATE, AFAR, FEAT, FEAR, HAIR, HEART, HATER, HEAT, RATE, ITEM... */ valid: ['FAIR','FAITH','FATE','FEAR','FEAT','HAIR','HATE','HATER','HEAT','HEART','HEATER','HEIR','HIRE','RAFT','RATE','TEAR','REFIT','EARTH','HAFT','RIFE','HEFT','AFTER','RATHE','HEARTH','AFFAIR','TARIFF','AFFRAY'] },
            { letters: 'AEILRTV', center: 'V', valid: ['VAIL','VALE','VEAL','VEIL','VITAL','VITAE','RIVE','LIVE','LIVER','OLIVE','RIVET','TRAVE','VIRAL','RIVAL','VARLET','TRIVIAL','TRIVET','VAILER'] }
        ];

        const STORE = 'bee.found.v1';
        let puzzle = PUZZLES[0];
        let typed = '';
        let found = new Set();
        let score = 0;
        let pangrams = 0;
        let order = [];

        const typingEl = document.getElementById('typing');
        const hexesEl = document.getElementById('hexes');
        const wordsEl = document.getElementById('words');
        const message = document.getElementById('message');
        const countEl = document.getElementById('count');
        const scoreEl = document.getElementById('score');
        const pangramsEl = document.getElementById('pangrams');

        function shuffle(arr) {
            arr = arr.slice();
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function buildHexes() {
            const others = puzzle.letters.split('').filter(c => c !== puzzle.center);
            order = [puzzle.center, ...shuffle(others)];
            // 7 hex positions: 1 center, 6 around — but we use a 3x3 grid omitting corners
            // Layout positions:  [0] [1] [2]  // 0,2 hidden; 1 = top
            //                   [3] [C] [4]
            //                   [5] [6] [7]
            // Actually let's just do a flat 3x3 with center highlighted
            hexesEl.innerHTML = '';
            const positions = [order[1], order[2], order[3], order[4], order[0], order[5], order[6]];
            // 7 hexes in grid (3-1-3)... simpler: just 3x3 with center being the gold one
            // Use a 3-col grid, place letters as: top row 3, middle row [empty, center, empty], bottom row 3
            const layout = [
                [order[1], order[2], order[3]],
                [null, order[0], null],
                [order[4], order[5], order[6]]
            ];
            // Use grid with 3 rows of 3 cols
            hexesEl.style.gridTemplateColumns = 'repeat(3, 1fr)';
            hexesEl.style.gridTemplateRows = 'repeat(3, 1fr)';
            hexesEl.style.gap = '8px';
            for (const row of layout) {
                for (const ch of row) {
                    const hex = document.createElement('div');
                    hex.className = 'hex';
                    if (ch === null) {
                        hex.style.background = 'transparent';
                        hex.style.border = 'none';
                        hex.style.cursor = 'default';
                        hex.textContent = '';
                    } else {
                        hex.textContent = ch;
                        if (ch === puzzle.center) hex.classList.add('center');
                        hex.addEventListener('click', () => addLetter(ch));
                    }
                    hexesEl.appendChild(hex);
                }
            }
        }

        function addLetter(ch) {
            typed += ch;
            renderTyping();
        }
        function delLetter() {
            typed = typed.slice(0, -1);
            renderTyping();
        }
        function renderTyping() {
            typingEl.textContent = typed || ' ';
        }

        function isPangram(word) {
            const set = new Set(word.split(''));
            return puzzle.letters.split('').every(c => set.has(c));
        }
        function score_word(word) {
            const base = word.length === 4 ? 1 : word.length;
            return isPangram(word) ? base + 7 : base;
        }

        function flash(msg) {
            message.textContent = msg;
            typingEl.classList.remove('shake');
            void typingEl.offsetWidth;
            typingEl.classList.add('shake');
            setTimeout(() => { if (message.textContent === msg) message.textContent = ''; }, 1600);
        }

        function submit() {
            const word = typed.toUpperCase();
            if (word.length < 4) return flash('Need 4 letters or more.');
            if (!word.includes(puzzle.center)) return flash('Must use the gold letter.');
            for (const ch of word) {
                if (!puzzle.letters.includes(ch)) return flash('Bad letter.');
            }
            if (found.has(word)) return flash('Already found.');
            if (!puzzle.valid.includes(word)) return flash('Not in the word list.');
            found.add(word);
            const pts = score_word(word);
            score += pts;
            const pan = isPangram(word);
            if (pan) pangrams++;
            const tag = document.createElement('span');
            tag.className = 'word' + (pan ? ' pangram' : '');
            tag.textContent = word;
            wordsEl.appendChild(tag);
            countEl.textContent = found.size;
            scoreEl.textContent = score;
            pangramsEl.textContent = pangrams;
            flash(pan ? `+${pts} ✦ Pangram!` : `+${pts}`);
            typed = '';
            renderTyping();
        }

        document.getElementById('enter').addEventListener('click', submit);
        document.getElementById('del').addEventListener('click', delLetter);
        document.getElementById('shuffle').addEventListener('click', buildHexes);

        document.addEventListener('keydown', (e) => {
            if (e.target.matches('button, input, textarea')) return;
            if (e.key === 'Enter') { submit(); e.preventDefault(); return; }
            if (e.key === 'Backspace') { delLetter(); e.preventDefault(); return; }
            const ch = e.key.toUpperCase();
            if (puzzle.letters.includes(ch)) addLetter(ch);
        });

        buildHexes();
        renderTyping();
    })();
    </script>
</body>
</html>
