<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verse Type Race</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/games.css">
    <style>
        .verse-wrap {
            background-color: var(--paper-card);
            background-image: var(--washi);
            background-blend-mode: multiply;
            padding: 24px 26px 22px;
            margin-bottom: 14px;
            box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 8px 18px -10px rgba(31, 26, 22, 0.3);
        }
        .verse-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.16rem;
            line-height: 1.7;
            color: var(--ink);
            letter-spacing: 0.005em;
            min-height: 80px;
        }
        .verse-text .ch { transition: color 0.05s, background-color 0.05s; }
        .verse-text .ch.correct { color: var(--moss); }
        .verse-text .ch.wrong { color: var(--seal); background-color: rgba(141, 53, 48, 0.18); }
        .verse-text .ch.cursor { background-color: rgba(31, 26, 22, 0.12); border-left: 2px solid var(--seal); margin-left: -2px; }
        .verse-ref {
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.74rem;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--seal);
            text-align: right;
        }
        .verse-ref a { color: inherit; text-decoration: none; border-bottom: 1px dotted rgba(141, 53, 48, 0.4); }
        .verse-ref a::after { content: '↗'; opacity: 0.6; margin-left: 3px; font-size: 0.85em; }
        textarea#input {
            width: 100%;
            min-height: 80px;
            padding: 14px 16px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.06rem;
            background-color: #fffcf3;
            border: 1px solid var(--rule);
            border-radius: 2px;
            color: var(--ink);
            resize: none;
        }
        textarea#input:focus { outline: none; border-color: var(--seal); box-shadow: 0 0 0 1px rgba(141, 53, 48, 0.25); }
    </style>
</head>
<body>
    <div class="bg has-image" aria-hidden="true"></div>
    <main class="page">
        <header class="title-card">
            <h1>Verse Type Race</h1>
            <p class="subtitle">Type the verse exactly. Track your speed and accuracy.</p>
        </header>

        <div class="score-strip">
            <div class="stat"><div class="label">WPM</div><div class="val" id="wpm">0</div></div>
            <div class="stat"><div class="label">Accuracy</div><div class="val" id="acc">—</div></div>
            <div class="stat"><div class="label">Best WPM</div><div class="val" id="best">0</div></div>
        </div>

        <div class="verse-wrap">
            <div class="verse-text" id="verse"></div>
            <div class="verse-ref" id="ref"></div>
        </div>

        <textarea id="input" placeholder="Begin typing here. The race starts on your first keystroke."></textarea>

        <div class="message" id="message"></div>

        <div id="result" class="result" hidden>
            <h3 id="result-title"></h3>
            <p id="result-summary" style="font-family:'Inter',sans-serif; font-size:0.92rem; color:var(--muted);"></p>
            <button class="btn" id="next" style="margin-top:14px;">Next verse</button>
        </div>

        <footer><p><a href="/">← back to seminary resources</a></p></footer>
    </main>

    <script>
    (function() {
        const VERSES = [
            { text: 'Be still, and know that I am God.', ref: 'Psalm 46:10', link: 'https://www.churchofjesuschrist.org/study/scriptures/ot/ps/46?lang=eng&id=p10#p10' },
            { text: 'Trust in the Lord with all thine heart; and lean not unto thine own understanding.', ref: 'Proverbs 3:5', link: 'https://www.churchofjesuschrist.org/study/scriptures/ot/prov/3?lang=eng&id=p5#p5' },
            { text: 'I will go and do the things which the Lord hath commanded.', ref: '1 Nephi 3:7', link: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/1-ne/3?lang=eng&id=p7#p7' },
            { text: 'For God so loved the world, that he gave his only begotten Son.', ref: 'John 3:16', link: 'https://www.churchofjesuschrist.org/study/scriptures/nt/john/3?lang=eng&id=p16#p16' },
            { text: 'If any of you lack wisdom, let him ask of God, that giveth to all men liberally.', ref: 'James 1:5', link: 'https://www.churchofjesuschrist.org/study/scriptures/nt/james/1?lang=eng&id=p5#p5' },
            { text: 'Now faith is the substance of things hoped for, the evidence of things not seen.', ref: 'Hebrews 11:1', link: 'https://www.churchofjesuschrist.org/study/scriptures/nt/heb/11?lang=eng&id=p1#p1' },
            { text: 'Remember the worth of souls is great in the sight of God.', ref: 'D&C 18:10', link: 'https://www.churchofjesuschrist.org/study/scriptures/dc-testament/dc/18?lang=eng&id=p10#p10' },
            { text: 'Adam fell that men might be; and men are, that they might have joy.', ref: '2 Nephi 2:25', link: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/2-ne/25?lang=eng&id=p25#p25' },
            { text: 'When ye are in the service of your fellow beings ye are only in the service of your God.', ref: 'Mosiah 2:17', link: 'https://www.churchofjesuschrist.org/study/scriptures/bofm/mosiah/2?lang=eng&id=p17#p17' },
            { text: 'Wherefore, stand ye in holy places, and be not moved.', ref: 'D&C 87:8', link: 'https://www.churchofjesuschrist.org/study/scriptures/dc-testament/dc/87?lang=eng&id=p8#p8' }
        ];

        const STORE = 'typerace.best.v1';
        let best = ((function(v){var n=parseInt(v,10);return Number.isFinite(n)&&n>=0?n:0;})(localStorage.getItem(STORE) || '0'));
        let target = null;
        let startTime = null;
        let pool = [];

        const verseEl = document.getElementById('verse');
        const refEl = document.getElementById('ref');
        const input = document.getElementById('input');
        const wpmEl = document.getElementById('wpm');
        const accEl = document.getElementById('acc');
        const bestEl = document.getElementById('best');
        const result = document.getElementById('result');
        bestEl.textContent = best;

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function newRound() {
            if (pool.length === 0) pool = shuffle(VERSES.slice());
            target = pool.pop();
            renderVerse('');
            refEl.innerHTML = `<a href="${target.link}" target="_blank" rel="noopener">${target.ref}</a>`;
            input.value = '';
            input.disabled = false;
            input.focus();
            startTime = null;
            wpmEl.textContent = '0';
            accEl.textContent = '—';
            result.hidden = true;
        }

        function renderVerse(typed) {
            verseEl.innerHTML = '';
            for (let i = 0; i < target.text.length; i++) {
                const ch = document.createElement('span');
                ch.className = 'ch';
                if (i < typed.length) {
                    ch.classList.add(typed[i] === target.text[i] ? 'correct' : 'wrong');
                } else if (i === typed.length) {
                    ch.classList.add('cursor');
                }
                ch.textContent = target.text[i];
                verseEl.appendChild(ch);
            }
        }

        input.addEventListener('paste', (e) => { e.preventDefault(); flash('No paste — type it.'); });
        input.addEventListener('drop', (e) => e.preventDefault());
        input.addEventListener('input', () => {
            if (!startTime && input.value.length > 0) startTime = Date.now();
            const typed = input.value;
            renderVerse(typed);
            updateLiveStats(typed);
            if (typed === target.text) finish(typed);
        });
        function flash(msg) {
            const m = document.getElementById('message');
            m.textContent = msg;
            setTimeout(() => { if (m.textContent === msg) m.textContent = ''; }, 1500);
        }

        function updateLiveStats(typed) {
            const elapsed = (Date.now() - startTime) / 1000;
            const minutes = Math.max(elapsed / 60, 1/60);
            const wordsTyped = typed.length / 5;
            const wpm = Math.round(wordsTyped / minutes);
            wpmEl.textContent = isFinite(wpm) ? wpm : 0;
            let correct = 0;
            for (let i = 0; i < typed.length && i < target.text.length; i++) {
                if (typed[i] === target.text[i]) correct++;
            }
            const acc = typed.length === 0 ? 100 : Math.round((correct / typed.length) * 100);
            accEl.textContent = acc + '%';
        }

        function finish(typed) {
            input.disabled = true;
            const elapsed = (Date.now() - startTime) / 1000;
            const minutes = Math.max(elapsed / 60, 1/60); // floor at 1 sec to avoid Infinity
            const wordsTyped = typed.length / 5;
            const wpm = Math.round(wordsTyped / minutes);
            const acc = 100; // exact match required to finish
            wpmEl.textContent = wpm;
            accEl.textContent = acc + '%';
            const isBest = wpm > best;
            if (isBest) {
                best = wpm;
                localStorage.setItem(STORE, best);
                bestEl.textContent = best;
            }
            document.getElementById('result-title').textContent = `✓ ${wpm} WPM · 100% accuracy`;
            document.getElementById('result-summary').textContent = isBest ? 'New personal best!' : `Personal best: ${best} WPM.`;
            result.hidden = false;
        }

        document.getElementById('next').addEventListener('click', newRound);
        newRound();
    })();
    </script>
</body>
</html>
